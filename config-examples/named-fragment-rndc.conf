// Paste this into named.conf (before include "/etc/named.root.key"; is a good place).
// Requires /etc/rndc.key in the image with group "named" readable (see Containerfile / tools/ensure-rndc-controls.sh).
//
// After first adding this, restart the container once: podman restart bindcaptain
//   (or: systemctl restart bindcaptain) so named loads the new controls { }.
// Later zone edits use: rndc reload / reconfig (BindCaptain does this for you).

include "/etc/rndc.key";
controls {
    inet 127.0.0.1 port 953
        allow { 127.0.0.1; }
        keys { "rndc-key"; };
};
